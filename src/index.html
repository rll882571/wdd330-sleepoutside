<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Outside | Home</title>
  <script src="js/main.js" type="module"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <header class="divider" id="main-header"></header>
  <main class="divider">
    <div class="hero">
      <img src="/images/banner-sm.jpg" srcset="images/banner-sm.jpg 500w, images/banner.jpg"
        alt="image of a high mountain lake" />
      <div class="logo logo--square">
        <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
        <div>Sleep<span class="highlight">Outside</span></div>
      </div>
      <div class="mission">
        <p>
          Our mission is to provide you with everything you need to sleep

        </p>
      </div>
    </div>
    <section class="products">
      <h2 id="product-category-title">Top Products</h2>
      <div class="category-links">
        <a href="product_listing/?category=tents">Tents</a>
        <a href="product_listing/?category=backpacks">Backpacks</a>
        <a href="product_listing/?category=sleeping-bags">Sleeping Bags</a>
        <a href="product_listing/?category=hammocks">Hammocks</a>

  <footer id="main-footer"></footer>
